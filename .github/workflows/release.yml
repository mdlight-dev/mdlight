name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            pkg_deps: libgtk-3-dev libwebkit2gtk-4.1-dev
          - os: ubuntu-24.04-arm
            arch: arm64
            pkg_deps: libgtk-3-dev libwebkit2gtk-4.1-dev
          - os: macos-latest
            arch: amd64
            pkg_deps: ""
          - os: macos-latest
            arch: arm64
            pkg_deps: ""
          - os: windows-latest
            arch: amd64
            pkg_deps: ""
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system deps
        if: matrix.pkg_deps != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.pkg_deps }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build with Wails
        run: wails build -tags "desktop,production" -ldflags "-s -w -X main.version=${{ github.ref_name }}"
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: mdlight-${{ github.ref_name }}-${{ runner.os }}-${{ matrix.arch }}
          path: build/bin/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - run: |
          cd _artifacts
          find . -type f -exec sha256sum {} \; > ../checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            _artifacts/**/*
            checksums.txt
          draft: true
          prerelease: false
          generate_release_notes: true