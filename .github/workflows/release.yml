name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  goreleaser:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            pkgs: libgtk-3-dev libwebkit2gtk-4.1-dev
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            pkgs: libgtk-3-dev libwebkit2gtk-4.1-dev
          - os: macos-latest
            goos: darwin
            goarch: amd64
            pkgs: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            pkgs: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            pkgs: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install system deps
        if: matrix.pkgs != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.pkgs }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~2"
          install-only: true

      - name: Build
        run: |
          make build \
            GOOS=${{ matrix.goos }} \
            GOARCH=${{ matrix.goarch }} \
            VERSION=${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdlight-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/mdlight*
          if-no-files-found: error

  linux-packages:
    needs: [goreleaser]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~2"
          install-only: true

      - name: Build packages
        run: |
          goreleaser build --clean --single-target \
            --output build/bin/mdlight \
            --goos linux --goarch ${{ matrix.goarch }}

      - name: Package .deb
        run: |
          goreleaser nfpm --clean --single-target \
            --config .goreleaser.yml \
            --goos linux --goarch ${{ matrix.goarch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}

      - name: Upload .deb / .rpm
        uses: actions/upload-artifact@v4
        with:
          name: mdlight-${{ github.ref_name }}-linux-${{ matrix.goarch }}-packages
          path: dist/*.deb
          if-no-files-found: warn

  release:
    needs: [goreleaser, linux-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Generate checksums
        run: |
          cd _artifacts
          find . -type f -exec sha256sum {} \; > ../checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            _artifacts/**/*
            checksums.txt
          draft: true
          prerelease: false
          generate_release_notes: true
